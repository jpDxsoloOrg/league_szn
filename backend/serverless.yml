service: wwe-2k-league-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: ${env:SLS_RUNTIME, 'nodejs20.x'}
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    SERVICE_NAME: ${self:service}
    STAGE: ${self:provider.stage}
    PLAYERS_TABLE: ${self:service}-players-${self:provider.stage}
    MATCHES_TABLE: ${self:service}-matches-${self:provider.stage}
    CHAMPIONSHIPS_TABLE: ${self:service}-championships-${self:provider.stage}
    CHAMPIONSHIP_HISTORY_TABLE: ${self:service}-championship-history-${self:provider.stage}
    TOURNAMENTS_TABLE: ${self:service}-tournaments-${self:provider.stage}
    SEASONS_TABLE: ${self:service}-seasons-${self:provider.stage}
    SEASON_STANDINGS_TABLE: ${self:service}-season-standings-${self:provider.stage}
    DIVISIONS_TABLE: ${self:service}-divisions-${self:provider.stage}
    EVENTS_TABLE: ${self:service}-events-${self:provider.stage}
    EVENT_CHECK_INS_TABLE: ${self:service}-event-check-ins-${self:provider.stage}
    CONTENDER_RANKINGS_TABLE: ${self:service}-contender-rankings-${self:provider.stage}
    RANKING_HISTORY_TABLE: ${self:service}-ranking-history-${self:provider.stage}
    CONTENDER_OVERRIDES_TABLE: ${self:service}-contender-overrides-${self:provider.stage}
    IMAGES_BUCKET: ${self:service}-images-${self:provider.stage}
    SITE_CONFIG_TABLE: ${self:service}-site-config-${self:provider.stage}
    CHALLENGES_TABLE: ${self:service}-challenges-${self:provider.stage}
    PROMOS_TABLE: ${self:service}-promos-${self:provider.stage}
    STIPULATIONS_TABLE: ${self:service}-stipulations-${self:provider.stage}
    MATCH_TYPES_TABLE: ${self:service}-match-types-${self:provider.stage}
    SEASON_AWARDS_TABLE: ${self:service}-season-awards-${self:provider.stage}
    COMPANIES_TABLE: ${self:service}-companies-${self:provider.stage}
    LOCATIONS_TABLE: ${self:service}-locations-${self:provider.stage}
    SHOWS_TABLE: ${self:service}-shows-${self:provider.stage}
    STABLES_TABLE: ${self:service}-stables-${self:provider.stage}
    TAG_TEAMS_TABLE: ${self:service}-tag-teams-${self:provider.stage}
    STABLE_INVITATIONS_TABLE: ${self:service}-stable-invitations-${self:provider.stage}
    FACTION_MESSAGES_TABLE: ${self:service}-faction-messages-${self:provider.stage}
    FACTION_DIRECT_MESSAGES_TABLE: ${self:service}-faction-direct-messages-${self:provider.stage}
    VIDEOS_TABLE: ${self:service}-videos-${self:provider.stage}
    ANNOUNCEMENTS_TABLE: ${self:service}-announcements-${self:provider.stage}
    NOTIFICATIONS_TABLE: ${self:service}-notifications-${self:provider.stage}
    WRESTLER_OVERALLS_TABLE: ${self:service}-wrestler-overalls-${self:provider.stage}
    WRESTLERS_TABLE: ${self:service}-wrestlers-${self:provider.stage}
    TRANSFER_REQUESTS_TABLE: ${self:service}-transfer-requests-${self:provider.stage}
    STORYLINE_REQUESTS_TABLE: ${self:service}-storyline-requests-${self:provider.stage}
    PRESENCE_TABLE: ${self:service}-presence-${self:provider.stage}
    MATCHMAKING_QUEUE_TABLE: ${self:service}-matchmaking-queue-${self:provider.stage}
    MATCH_INVITATIONS_TABLE: ${self:service}-match-invitations-${self:provider.stage}
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, 'http://localhost:8000'}
    DB_DRIVER: ${env:DB_DRIVER, 'dynamo'}
    COGNITO_USER_POOL_ID: !Ref LeagueUserPool
    COGNITO_CLIENT_ID: !Ref LeagueUserPoolClient
    ADMIN_SETUP_KEY: ${env:ADMIN_SETUP_KEY, 'default-dev-key-change-in-production'}
    ALLOWED_ORIGIN: ${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PLAYERS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PLAYERS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCHES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCHES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHAMPIONSHIPS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHAMPIONSHIP_HISTORY_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TOURNAMENTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASON_STANDINGS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASON_STANDINGS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.DIVISIONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.EVENTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.EVENTS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.EVENT_CHECK_INS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.EVENT_CHECK_INS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CONTENDER_RANKINGS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CONTENDER_RANKINGS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.RANKING_HISTORY_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.RANKING_HISTORY_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CONTENDER_OVERRIDES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CONTENDER_OVERRIDES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SITE_CONFIG_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHALLENGES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHALLENGES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PROMOS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PROMOS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.STIPULATIONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCH_TYPES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASON_AWARDS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.COMPANIES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.LOCATIONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SHOWS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SHOWS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.STABLES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.STABLES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TAG_TEAMS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TAG_TEAMS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.STABLE_INVITATIONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.STABLE_INVITATIONS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.FACTION_MESSAGES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.FACTION_MESSAGES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.FACTION_DIRECT_MESSAGES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.FACTION_DIRECT_MESSAGES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.VIDEOS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.VIDEOS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.ANNOUNCEMENTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.ANNOUNCEMENTS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.NOTIFICATIONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.NOTIFICATIONS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.WRESTLER_OVERALLS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.WRESTLERS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.WRESTLERS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TRANSFER_REQUESTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TRANSFER_REQUESTS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.STORYLINE_REQUESTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.STORYLINE_REQUESTS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PRESENCE_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCHMAKING_QUEUE_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCH_INVITATIONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCH_INVITATIONS_TABLE}/index/*
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::${self:provider.environment.IMAGES_BUCKET}/*
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminAddUserToGroup
            - cognito-idp:AdminRemoveUserFromGroup
            - cognito-idp:AdminListGroupsForUser
            - cognito-idp:AdminDeleteUser
            - cognito-idp:AdminDisableUser
            - cognito-idp:AdminEnableUser
            - cognito-idp:ListUsers
            - cognito-idp:ListUsersInGroup
          Resource:
            - !GetAtt LeagueUserPool.Arn
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - arn:aws:lambda:${self:provider.region}:*:function:${self:service}-${self:provider.stage}-calculateRankings

plugins:
  - serverless-plugin-typescript
  - serverless-plugin-split-stacks
  - serverless-offline

custom:
  splitStacksEnabled:
    dev: true
    devtest: true
    offline: false
  splitStacks:
    perFunction: false
    perType: ${self:custom.splitStacksEnabled.${self:provider.stage}, true}
    perGroupFunction: false
  serverless-offline:
    httpPort: 3001
    environment:
      IS_OFFLINE: 'true'
  allowedOrigin:
    dev: https://leagueszn.jpdxsolo.com
    devtest: https://dev.leagueszn.jpdxsolo.com
    prod: https://leagueszn.jpdxsolo.com
    offline: '*'
  corsConfig: &corsConfig
    origin: ${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}
    headers:
      - Content-Type
      - X-Amz-Date
      - Authorization
      - X-Api-Key
      - X-Amz-Security-Token
      - X-Amz-User-Agent
    allowCredentials: true
  frontendBucket:
    dev: leagueszn.jpdxsolo.com
    devtest: dev.leagueszn.jpdxsolo.com
    prod: leagueszn.jpdxsolo.com
    offline: 'localhost'
  frontendDomain:
    dev: leagueszn.jpdxsolo.com
    devtest: dev.leagueszn.jpdxsolo.com
    prod: leagueszn.jpdxsolo.com
    offline: 'localhost'
  certificateArn:
    dev: ${env:PROD_ACM_CERTIFICATE_ARN, ''}
    devtest: ${env:DEV_ACM_CERTIFICATE_ARN, ''}
    prod: ${env:PROD_ACM_CERTIFICATE_ARN, ''}
    offline: ''

functions:
  # Auth
  adminAuthorizer:
    handler: functions/auth/authorizer.handler

  postConfirmation:
    handler: functions/auth/postConfirmation.handler

  createAdminUser:
    handler: functions/auth/createAdminUser.handler
    events:
      - http:
          path: auth/setup
          method: post
          cors: *corsConfig

  login:
    handler: functions/auth/login.handler
    events:
      - http:
          path: auth/login
          method: post
          cors: *corsConfig

  # User Management (Phase 3 consolidated: listUsers, updateUserRole, toggleUserEnabled)
  users:
    handler: functions/users/handler.handler
    events:
      - http:
          path: admin/users
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/users/role
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/users/toggle-enabled
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/users/delete
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Site Configuration + Admin tools (Phase 3 consolidated: getSiteConfig, updateSiteConfig, clearAll, seedData)
  admin:
    handler: functions/admin/handler.handler
    timeout: 29
    events:
      - http:
          path: site-config
          method: get
          cors: *corsConfig
      - http:
          path: admin/site-config
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/clear-all
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/seed-data
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/export-data
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Players (Phase 2 consolidated: getPlayers, createPlayer, updatePlayer, deletePlayer, getMyProfile, updateMyProfile)
  players:
    handler: functions/players/handler.handler
    # Single Lambda that routes all /players traffic. Per-path methods are
    # collapsed to ANY (8 http events -> 4) and the gateway-level authorizer
    # is removed -- JWT verification + role checks happen in-Lambda via
    # lib/router.ts + lib/authenticate.ts + requireRole. This trims
    # CloudFormation method/permission resources without introducing a
    # {proxy+} sibling to {playerId}, which API Gateway rejects.
    events:
      - http:
          path: players
          method: any
          cors: *corsConfig
      - http:
          path: players/me
          method: any
          cors: *corsConfig
      - http:
          path: players/{playerId}
          method: any
          cors: *corsConfig
      - http:
          path: players/{playerId}/statistics
          method: get
          cors: *corsConfig

  # Overalls (Wrestler Overalls: submit, get own, admin get all)
  overalls:
    handler: functions/overalls/handler.handler
    events:
      - http:
          path: players/me/overall
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: players/me/overall
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/overalls
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Division Transfer Requests
  transfers:
    handler: functions/transfers/handler.handler
    events:
      - http:
          path: transfers
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: transfers/me
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/transfers
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/transfers/{requestId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  storylineRequests:
    handler: functions/storylineRequests/handler.handler
    events:
      - http:
          path: storyline-requests
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: storyline-requests/me
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/storyline-requests
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/storyline-requests/{requestId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Matches (Phase 3 consolidated: getMatches, scheduleMatch, recordResult)
  matches:
    handler: functions/matches/handler.handler
    events:
      - http:
          path: matches
          method: any
          cors: *corsConfig
      - http:
          path: matches/{matchId}/result
          method: put
          cors: *corsConfig
      - http:
          path: matches/{matchId}/slots/{slotId}/claim
          method: any
          cors: *corsConfig
      - http:
          path: matches/{matchId}/slots/{slotId}
          method: any
          cors: *corsConfig
      - http:
          path: matches/{matchId}
          method: any
          cors: *corsConfig

  # Championships (Phase 2 consolidated: getChampionships, createChampionship, getChampionshipHistory, updateChampionship, deleteChampionship, vacateChampionship)
  championships:
    handler: functions/championships/handler.handler
    events:
      - http:
          path: championships
          method: any
          cors: *corsConfig
      - http:
          path: championships/{championshipId}/history
          method: get
          cors: *corsConfig
      - http:
          path: championships/{championshipId}
          method: any
          cors: *corsConfig
      - http:
          path: championships/{championshipId}/vacate
          method: post
          cors: *corsConfig

  # Tournaments (Phase 3 consolidated: getTournaments, createTournament, updateTournament)
  tournaments:
    handler: functions/tournaments/handler.handler
    events:
      - http:
          path: tournaments
          method: get
          cors: *corsConfig
      - http:
          path: tournaments
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: tournaments/{tournamentId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Dashboard (aggregated league overview)
  getDashboard:
    handler: functions/dashboard/getDashboard.handler
    events:
      - http:
          path: dashboard
          method: get
          cors: *corsConfig

  # Standings
  getStandings:
    handler: functions/standings/getStandings.handler
    events:
      - http:
          path: standings
          method: get
          cors: *corsConfig

  # Activity feed (news feed / activity timeline)
  activity:
    handler: functions/activity/handler.handler
    events:
      - http:
          path: activity
          method: get
          cors: *corsConfig

  # Seasons (Phase 1 consolidated: getSeasons, createSeason, updateSeason, deleteSeason)
  seasons:
    handler: functions/seasons/handler.handler
    events:
      - http:
          path: seasons
          method: get
          cors: *corsConfig
      - http:
          path: seasons
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: seasons/{seasonId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: seasons/{seasonId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Season Awards (GET, POST, DELETE for season awards)
  seasonAwards:
    handler: functions/seasonAwards/handler.handler
    events:
      - http:
          path: seasons/{seasonId}/awards
          method: get
          cors: *corsConfig
      - http:
          path: seasons/{seasonId}/awards
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: seasons/{seasonId}/awards/{awardId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Companies (CRUD for wrestling companies)
  companies:
    handler: functions/companies/handler.handler
    events:
      - http:
          path: companies
          method: any
          cors: *corsConfig
      - http:
          path: companies/{companyId}
          method: any
          cors: *corsConfig

  # Shows (CRUD for wrestling shows, linked to companies)
  shows:
    handler: functions/shows/handler.handler
    events:
      - http:
          path: shows
          method: any
          cors: *corsConfig
      - http:
          path: shows/{showId}
          method: any
          cors: *corsConfig

  # Locations (CRUD + bulk import for venue records used by events)
  locations:
    handler: functions/locations/handler.handler
    events:
      - http:
          path: locations
          method: get
          cors: *corsConfig
      - http:
          path: locations
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: locations/bulk
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: locations/{locationId}
          method: get
          cors: *corsConfig
      - http:
          path: locations/{locationId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: locations/{locationId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Divisions (Phase 1 consolidated: getDivisions, createDivision, updateDivision, deleteDivision)
  divisions:
    handler: functions/divisions/handler.handler
    events:
      - http:
          path: divisions
          method: get
          cors: *corsConfig
      - http:
          path: divisions
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: divisions/{divisionId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: divisions/{divisionId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Wrestlers (roster CRUD + bulk import)
  # Routes consolidated to ANY-per-path; auth moved in-Lambda via lib/router
  # requireAuth + lib/authenticate. Public GETs, admin mutations.
  wrestlers:
    handler: functions/wrestlers/handler.handler
    events:
      - http:
          path: wrestlers
          method: any
          cors: *corsConfig
      - http:
          path: wrestlers/{wrestlerId}
          method: any
          cors: *corsConfig
      - http:
          path: wrestlers/import
          method: post
          cors: *corsConfig

  # Stipulations (Phase 1 consolidated: getStipulations, createStipulation, updateStipulation, deleteStipulation)
  stipulations:
    handler: functions/stipulations/handler.handler
    events:
      - http:
          path: stipulations
          method: get
          cors: *corsConfig
      - http:
          path: stipulations
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: stipulations/{stipulationId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: stipulations/{stipulationId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Match Types (Phase 1 consolidated: getMatchTypes, createMatchType, updateMatchType, deleteMatchType)
  matchTypes:
    handler: functions/matchTypes/handler.handler
    events:
      - http:
          path: match-types
          method: any
          cors: *corsConfig
      - http:
          path: match-types/{matchTypeId}
          method: any
          cors: *corsConfig

  # Events (Phase 2 consolidated: getEvents, getEvent, createEvent, updateEvent, deleteEvent)
  events:
    handler: functions/events/handler.handler
    # Routes consolidated to ANY-per-path; auth moved in-Lambda via lib/router
    # requireAuth + lib/authenticate. 10 http events collapsed to 6.
    events:
      - http:
          path: events
          method: any
          cors: *corsConfig
      - http:
          path: events/{eventId}
          method: any
          cors: *corsConfig
      - http:
          path: events/{eventId}/check-in
          method: any
          cors: *corsConfig
      - http:
          path: events/{eventId}/check-in/me
          method: get
          cors: *corsConfig
      - http:
          path: events/{eventId}/check-ins/summary
          method: get
          cors: *corsConfig
      - http:
          path: events/{eventId}/check-ins
          method: get
          cors: *corsConfig

  # Contenders (Phase 3 consolidated: getContenders, calculateRankings)
  contenders:
    handler: functions/contenders/handler.handler
    timeout: 29
    events:
      - http:
          path: championships/{championshipId}/contenders
          method: get
          cors: *corsConfig
      - http:
          path: admin/contenders/recalculate
          method: post
          cors: *corsConfig
      - http:
          path: admin/contenders/overrides
          method: any
          cors: *corsConfig
      - http:
          path: admin/contenders/overrides/{championshipId}/{playerId}
          method: delete
          cors: *corsConfig

  # Images
  generateUploadUrl:
    handler: functions/images/generateUploadUrl.handler
    events:
      - http:
          path: images/upload-url
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # API Documentation (Swagger UI + OpenAPI spec)
  serveSwaggerUi:
    handler: functions/docs/serveDocs.handler
    events:
      - http:
          path: api-docs
          method: get
          cors: *corsConfig

  serveOpenApiSpec:
    handler: functions/docs/serveDocs.handler
    events:
      - http:
          path: api-docs/spec
          method: get
          cors: *corsConfig

  # Statistics
  getStatistics:
    handler: functions/statistics/getStatistics.handler
    timeout: 29
    events:
      - http:
          path: statistics
          method: get
          cors: *corsConfig

  getRivalries:
    handler: functions/rivalries/getRivalries.handler
    timeout: 15
    events:
      - http:
          path: rivalries
          method: get
          cors: *corsConfig

  # Challenges (Phase 2 consolidated: getChallenges, getChallenge, create, respond, cancel, delete, bulkDelete)
  challenges:
    handler: functions/challenges/handler.handler
    events:
      - http:
          path: challenges
          method: any
          cors: *corsConfig
      - http:
          path: challenges/{challengeId}
          method: any
          cors: *corsConfig
      - http:
          path: challenges/{challengeId}/respond
          method: post
          cors: *corsConfig
      - http:
          path: challenges/{challengeId}/cancel
          method: post
          cors: *corsConfig
      - http:
          path: challenges/bulk-delete
          method: post
          cors: *corsConfig

  # Matchmaking (consolidated: heartbeat, presence, queue join/leave/list, online, invite, invitations list/accept/decline)
  matchmaking:
    handler: functions/matchmaking/handler.handler
    events:
      - http:
          path: matchmaking/heartbeat
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/presence
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/queue/join
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/queue/leave
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/queue
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/online
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/invite
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/invitations
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/invitations/{invitationId}/accept
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matchmaking/invitations/{invitationId}/decline
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Promos (Phase 2 consolidated: getPromos, getPromo, create, react, adminUpdate, delete, bulkDelete)
  promos:
    handler: functions/promos/handler.handler
    events:
      - http:
          path: promos
          method: any
          cors: *corsConfig
      - http:
          path: promos/{promoId}
          method: get
          cors: *corsConfig
      - http:
          path: promos/{promoId}/react
          method: post
          cors: *corsConfig
      - http:
          path: admin/promos/{promoId}
          method: any
          cors: *corsConfig
      - http:
          path: admin/promos/bulk-delete
          method: post
          cors: *corsConfig

  # Stables (consolidated: list, get, standings, create, update, approve, reject, invite, respond, disband, remove-member, delete)
  stables:
    handler: functions/stables/handler.handler
    # Routes consolidated to ANY-per-path; auth moved in-Lambda via lib/router
    # requireAuth + lib/authenticate. 13 http events collapsed to 9.
    # (GET /stables/{stableId} previously had cors:true; now uses the shared
    # *corsConfig, tightening the preflight Allow-Origin to the frontend.)
    events:
      - http:
          path: stables
          method: any
          cors: *corsConfig
      - http:
          path: stables/standings
          method: get
          cors: *corsConfig
      - http:
          path: stables/{stableId}
          method: any
          cors: *corsConfig
      - http:
          path: stables/{stableId}/approve
          method: post
          cors: *corsConfig
      - http:
          path: stables/{stableId}/reject
          method: post
          cors: *corsConfig
      - http:
          path: stables/{stableId}/invitations
          method: any
          cors: *corsConfig
      - http:
          path: stables/{stableId}/invitations/{invitationId}/respond
          method: post
          cors: *corsConfig
      - http:
          path: stables/{stableId}/disband
          method: post
          cors: *corsConfig
      - http:
          path: stables/{stableId}/reactivate
          method: post
          cors: *corsConfig
      - http:
          path: stables/{stableId}/remove-member
          method: post
          cors: *corsConfig
      - http:
          path: stables/{stableId}/messages
          method: any
          cors: *corsConfig
      - http:
          path: stables/{stableId}/direct-messages
          method: any
          cors: *corsConfig
      - http:
          path: stables/{stableId}/direct-messages/{partnerPlayerId}
          method: any
          cors: *corsConfig
      - http:
          path: stables/{stableId}/stats
          method: get
          cors: *corsConfig
      - http:
          path: stables/{stableId}/schedule
          method: get
          cors: *corsConfig
      - http:
          path: stables/{stableId}/promos
          method: get
          cors: *corsConfig

  # Tag Teams (consolidated: list, get, standings, create, update, respond, approve, reject, dissolve, delete)
  tagTeams:
    handler: functions/tagTeams/handler.handler
    # Routes consolidated to ANY-per-path; auth moved in-Lambda via lib/router
    # requireAuth + lib/authenticate. 10 http events collapsed to 7.
    # (GET /tag-teams/{tagTeamId} previously had cors:true; now uses the
    # shared *corsConfig, tightening the preflight Allow-Origin to the
    # frontend.)
    events:
      - http:
          path: tag-teams
          method: any
          cors: *corsConfig
      - http:
          path: tag-teams/standings
          method: get
          cors: *corsConfig
      - http:
          path: tag-teams/{tagTeamId}
          method: any
          cors: *corsConfig
      - http:
          path: tag-teams/{tagTeamId}/respond
          method: post
          cors: *corsConfig
      - http:
          path: tag-teams/{tagTeamId}/approve
          method: post
          cors: *corsConfig
      - http:
          path: tag-teams/{tagTeamId}/reject
          method: post
          cors: *corsConfig
      - http:
          path: tag-teams/{tagTeamId}/dissolve
          method: post
          cors: *corsConfig

  # Announcements (consolidated: getActive, adminList, create, update, delete)
  videos:
    handler: functions/videos/handler.handler
    events:
      - http:
          path: videos
          method: get
          cors: *corsConfig
      - http:
          path: videos/{videoId}
          method: get
          cors: *corsConfig
      - http:
          path: admin/videos
          method: any
          cors: *corsConfig
      - http:
          path: admin/videos/{videoId}
          method: any
          cors: *corsConfig

  announcements:
    handler: functions/announcements/handler.handler
    events:
      - http:
          path: announcements/active
          method: get
          cors: *corsConfig
      - http:
          path: admin/announcements
          method: any
          cors: *corsConfig
      - http:
          path: admin/announcements/{announcementId}
          method: any
          cors: *corsConfig

  # Notifications (consolidated: list, unreadCount, markRead, markAllRead)
  notifications:
    handler: functions/notifications/handler.handler
    events:
      - http:
          path: notifications
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: notifications/unread-count
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: notifications/{notificationId}/read
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: notifications/mark-all-read
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: notifications/delete-read
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: notifications/{notificationId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

resources:
  Resources:
    # API Gateway Response for CORS with Authorizer
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: DEFAULT_4XX
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseDefault5XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: DEFAULT_5XX
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseUnauthorized:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: UNAUTHORIZED
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseAccessDenied:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: ACCESS_DENIED
        RestApiId:
          Ref: ApiGatewayRestApi

    # New Cognito User Pool (v3) with email login and roles
    # PostConfirmation trigger is attached via setup-cognito.sh after deploy
    # (can't be in CloudFormation due to circular dep with shared IAM role)
    LeagueUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-pool-v3-${self:provider.stage}
        # Tag bumped on 2026-05-03 to force CloudFormation to re-apply the
        # full User Pool config after a destructive update-user-pool call
        # in setup-cognito.sh wiped AutoVerifiedAttributes (verification
        # emails stopped sending). Once dev + prod are healed this can stay
        # in place — it's harmless and gives us a knob to force-reapply
        # config in the future.
        UserPoolTags:
          ManagedBy: ServerlessStack
          ConfigVersion: '2'
        AdminCreateUserConfig:
          AllowAdminCreateUserOnly: false
        AutoVerifiedAttributes:
          - email
        UsernameAttributes:
          - email
        Schema:
          - Name: email
            Required: true
            Mutable: true
          - Name: wrestler_name
            AttributeDataType: String
            Mutable: true
            StringAttributeConstraints:
              MinLength: '0'
              MaxLength: '100'
          - Name: psn_id
            AttributeDataType: String
            Mutable: true
            StringAttributeConstraints:
              MinLength: '0'
              MaxLength: '50'
          - Name: player_name
            AttributeDataType: String
            Mutable: true
            StringAttributeConstraints:
              MinLength: '0'
              MaxLength: '100'
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
            RequireUppercase: true

    # Cognito Groups for role-based access
    AdminGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Admin
        UserPoolId: !Ref LeagueUserPool
        Description: Full access to all features including user management
        Precedence: 0

    ModeratorGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Moderator
        UserPoolId: !Ref LeagueUserPool
        Description: Admin-level access except cannot manage Admin/Moderator roles or delete all data
        Precedence: 1

    WrestlerGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Wrestler
        UserPoolId: !Ref LeagueUserPool
        Description: Access to wrestler features (challenges, promos)
        Precedence: 2

    LeagueUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-client-v3-${self:provider.stage}
        UserPoolId: !Ref LeagueUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        PreventUserExistenceErrors: ENABLED
        AccessTokenValidity: 24
        IdTokenValidity: 24
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days

    PlayersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PLAYERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: playerId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: playerId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: UserIdIndex
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    MatchesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MATCHES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: matchId
            AttributeType: S
          - AttributeName: date
            AttributeType: S
          - AttributeName: tournamentId
            AttributeType: S
        KeySchema:
          - AttributeName: matchId
            KeyType: HASH
          - AttributeName: date
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: TournamentIndex
            KeySchema:
              - AttributeName: tournamentId
                KeyType: HASH
              - AttributeName: matchId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    ChampionshipsTable:
