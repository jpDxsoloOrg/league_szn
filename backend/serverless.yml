        KeySchema:
          - AttributeName: championshipId
            KeyType: HASH
          - AttributeName: playerId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: RankIndex
            KeySchema:
              - AttributeName: championshipId
                KeyType: HASH
              - AttributeName: rank
                KeyType: RANGE
