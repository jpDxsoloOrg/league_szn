          - AttributeName: eventId
            KeyType: HASH
          - AttributeName: playerId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: PlayerEventIndex
            KeySchema:
              - AttributeName: playerId
                KeyType: HASH
              - AttributeName: eventId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
