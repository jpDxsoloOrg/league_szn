service: wwe-2k-league-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    PLAYERS_TABLE: ${self:service}-players-${self:provider.stage}
    MATCHES_TABLE: ${self:service}-matches-${self:provider.stage}
    CHAMPIONSHIPS_TABLE: ${self:service}-championships-${self:provider.stage}
    CHAMPIONSHIP_HISTORY_TABLE: ${self:service}-championship-history-${self:provider.stage}
    TOURNAMENTS_TABLE: ${self:service}-tournaments-${self:provider.stage}
    SEASONS_TABLE: ${self:service}-seasons-${self:provider.stage}
    SEASON_STANDINGS_TABLE: ${self:service}-season-standings-${self:provider.stage}
    DIVISIONS_TABLE: ${self:service}-divisions-${self:provider.stage}
    IMAGES_BUCKET: ${self:service}-images-${self:provider.stage}
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PLAYERS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCHES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCHES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHAMPIONSHIPS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHAMPIONSHIP_HISTORY_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TOURNAMENTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASON_STANDINGS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASON_STANDINGS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.DIVISIONS_TABLE}
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::${self:provider.environment.IMAGES_BUCKET}/*
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminGetUser
          Resource:
            - !GetAtt CognitoUserPool.Arn

plugins:
  - serverless-plugin-typescript
  - serverless-offline
  - serverless-s3-sync

custom:
  serverless-offline:
    httpPort: 3001
    environment:
      IS_OFFLINE: 'true'
  frontendBucket:
    dev: leagueszn.jpdxsolo.com
    devtest: dev.leagueszn.jpdxsolo.com
  frontendDomain:
    dev: leagueszn.jpdxsolo.com
    devtest: dev.leagueszn.jpdxsolo.com
  certificateArn:
    dev: ${env:PROD_ACM_CERTIFICATE_ARN, ''}
    devtest: ${env:DEV_ACM_CERTIFICATE_ARN, ''}
  s3Sync:
    - bucketName: ${self:custom.frontendBucket.${self:provider.stage}, 'leagueszn.jpdxsolo.com'}
      localDir: ../frontend/dist
      deleteRemoved: true

functions:
  # Auth
  adminAuthorizer:
    handler: functions/auth/authorizer.handler

  createAdminUser:
    handler: functions/auth/createAdminUser.handler
    events:
      - http:
          path: auth/setup
          method: post
          cors: true

  # Players
  getPlayers:
    handler: functions/players/getPlayers.handler
    events:
      - http:
          path: players
          method: get
          cors: true

  createPlayer:
    handler: functions/players/createPlayer.handler
    events:
      - http:
          path: players
          method: post
          cors: true
          authorizer: adminAuthorizer

  updatePlayer:
    handler: functions/players/updatePlayer.handler
    events:
      - http:
          path: players/{playerId}
          method: put
          cors: true
          authorizer: adminAuthorizer

  deletePlayer:
    handler: functions/players/deletePlayer.handler
    events:
      - http:
          path: players/{playerId}
          method: delete
          cors: true
          authorizer: adminAuthorizer

  # Matches
  getMatches:
    handler: functions/matches/getMatches.handler
    events:
      - http:
          path: matches
          method: get
          cors: true

  scheduleMatch:
    handler: functions/matches/scheduleMatch.handler
    events:
      - http:
          path: matches
          method: post
          cors: true
          authorizer: adminAuthorizer

  recordResult:
    handler: functions/matches/recordResult.handler
    events:
      - http:
          path: matches/{matchId}/result
          method: put
          cors: true
          authorizer: adminAuthorizer

  # Championships
  getChampionships:
    handler: functions/championships/getChampionships.handler
    events:
      - http:
          path: championships
          method: get
          cors: true

  createChampionship:
    handler: functions/championships/createChampionship.handler
    events:
      - http:
          path: championships
          method: post
          cors: true
          authorizer: adminAuthorizer

  getChampionshipHistory:
    handler: functions/championships/getChampionshipHistory.handler
    events:
      - http:
          path: championships/{championshipId}/history
          method: get
          cors: true

  updateChampionship:
    handler: functions/championships/updateChampionship.handler
    events:
      - http:
          path: championships/{championshipId}
          method: put
          cors: true
          authorizer: adminAuthorizer

  deleteChampionship:
    handler: functions/championships/deleteChampionship.handler
    events:
      - http:
          path: championships/{championshipId}
          method: delete
          cors: true
          authorizer: adminAuthorizer

  # Tournaments
  getTournaments:
    handler: functions/tournaments/getTournaments.handler
    events:
      - http:
          path: tournaments
          method: get
          cors: true

  createTournament:
    handler: functions/tournaments/createTournament.handler
    events:
      - http:
          path: tournaments
          method: post
          cors: true
          authorizer: adminAuthorizer

  updateTournament:
    handler: functions/tournaments/updateTournament.handler
    events:
      - http:
          path: tournaments/{tournamentId}
          method: put
          cors: true
          authorizer: adminAuthorizer

  # Standings
  getStandings:
    handler: functions/standings/getStandings.handler
    events:
      - http:
          path: standings
          method: get
          cors: true

  # Seasons
  getSeasons:
    handler: functions/seasons/getSeasons.handler
    events:
      - http:
          path: seasons
          method: get
          cors: true

  createSeason:
    handler: functions/seasons/createSeason.handler
    events:
      - http:
          path: seasons
          method: post
          cors: true
          authorizer: adminAuthorizer

  updateSeason:
    handler: functions/seasons/updateSeason.handler
    events:
      - http:
          path: seasons/{seasonId}
          method: put
          cors: true
          authorizer: adminAuthorizer

  deleteSeason:
    handler: functions/seasons/deleteSeason.handler
    events:
      - http:
          path: seasons/{seasonId}
          method: delete
          cors: true
          authorizer: adminAuthorizer

  # Divisions
  getDivisions:
    handler: functions/divisions/getDivisions.handler
    events:
      - http:
          path: divisions
          method: get
          cors: true

  createDivision:
    handler: functions/divisions/createDivision.handler
    events:
      - http:
          path: divisions
          method: post
          cors: true
          authorizer: adminAuthorizer

  updateDivision:
    handler: functions/divisions/updateDivision.handler
    events:
      - http:
          path: divisions/{divisionId}
          method: put
          cors: true
          authorizer: adminAuthorizer

  deleteDivision:
    handler: functions/divisions/deleteDivision.handler
    events:
      - http:
          path: divisions/{divisionId}
          method: delete
          cors: true
          authorizer: adminAuthorizer

  # Images
  generateUploadUrl:
    handler: functions/images/generateUploadUrl.handler
    events:
      - http:
          path: images/upload-url
          method: post
          cors: true
          authorizer: adminAuthorizer

  # Admin
  clearAll:
    handler: functions/admin/clearAll.handler
    events:
      - http:
          path: admin/clear-all
          method: delete
          cors: true
          authorizer: adminAuthorizer

  seedData:
    handler: functions/admin/seedData.handler
    events:
      - http:
          path: admin/seed-data
          method: post
          cors: true
          authorizer: adminAuthorizer

resources:
  Resources:
    # API Gateway Response for CORS with Authorizer
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: DEFAULT_4XX
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseDefault5XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: DEFAULT_5XX
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseUnauthorized:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: UNAUTHORIZED
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseAccessDenied:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: ACCESS_DENIED
        RestApiId:
          Ref: ApiGatewayRestApi

    # Cognito User Pool for Admin Authentication
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-admin-pool-${self:provider.stage}
        AdminCreateUserConfig:
          AllowAdminCreateUserOnly: true
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
            RequireUppercase: true

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-admin-client-${self:provider.stage}
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        PreventUserExistenceErrors: ENABLED
        AccessTokenValidity: 24
        IdTokenValidity: 24
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days

    PlayersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PLAYERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: playerId
            AttributeType: S
        KeySchema:
          - AttributeName: playerId
            KeyType: HASH

    MatchesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MATCHES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: matchId
            AttributeType: S
          - AttributeName: date
            AttributeType: S
          - AttributeName: tournamentId
            AttributeType: S
        KeySchema:
          - AttributeName: matchId
            KeyType: HASH
          - AttributeName: date
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: TournamentIndex
            KeySchema:
              - AttributeName: tournamentId
                KeyType: HASH
              - AttributeName: matchId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    ChampionshipsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CHAMPIONSHIPS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: championshipId
            AttributeType: S
        KeySchema:
          - AttributeName: championshipId
            KeyType: HASH

    ChampionshipHistoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CHAMPIONSHIP_HISTORY_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: championshipId
            AttributeType: S
          - AttributeName: wonDate
            AttributeType: S
        KeySchema:
          - AttributeName: championshipId
            KeyType: HASH
          - AttributeName: wonDate
            KeyType: RANGE

    TournamentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TOURNAMENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tournamentId
            AttributeType: S
        KeySchema:
          - AttributeName: tournamentId
            KeyType: HASH

    SeasonsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SEASONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: seasonId
            AttributeType: S
        KeySchema:
          - AttributeName: seasonId
            KeyType: HASH

    SeasonStandingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SEASON_STANDINGS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: seasonId
            AttributeType: S
          - AttributeName: playerId
            AttributeType: S
        KeySchema:
          - AttributeName: seasonId
            KeyType: HASH
          - AttributeName: playerId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: PlayerIndex
            KeySchema:
              - AttributeName: playerId
                KeyType: HASH
              - AttributeName: seasonId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    DivisionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DIVISIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: divisionId
            AttributeType: S
        KeySchema:
          - AttributeName: divisionId
            KeyType: HASH

    ImagesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.IMAGES_BUCKET}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - PUT
                - POST
              AllowedOrigins:
                - '*'
              MaxAge: 3000

    ImagesBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref ImagesBucket
        PolicyDocument:
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action:
                - s3:GetObject
              Resource:
                - !Sub '${ImagesBucket.Arn}/*'

    # CloudFront Distribution for HTTPS frontend
    # Uses S3 website endpoint (existing public bucket) instead of OAI
    FrontendCloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          Comment: CloudFront distribution for ${self:custom.frontendDomain.${self:provider.stage}, 'leagueszn.jpdxsolo.com'}
          DefaultRootObject: index.html
          Aliases:
            - ${self:custom.frontendDomain.${self:provider.stage}, 'leagueszn.jpdxsolo.com'}
          Origins:
            - Id: S3WebsiteOrigin
              DomainName: ${self:custom.frontendBucket.${self:provider.stage}, 'leagueszn.jpdxsolo.com'}.s3-website-us-east-1.amazonaws.com
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: http-only
          DefaultCacheBehavior:
            TargetOriginId: S3WebsiteOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            DefaultTTL: 86400
            MaxTTL: 31536000
            MinTTL: 0
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 0
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 0
          ViewerCertificate:
            AcmCertificateArn: ${self:custom.certificateArn.${self:provider.stage}}
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          HttpVersion: http2
          PriceClass: PriceClass_100

  Outputs:
    CloudFrontDistributionId:
      Description: CloudFront Distribution ID for cache invalidation
      Value: !Ref FrontendCloudFrontDistribution
      Export:
        Name: ${self:service}-${self:provider.stage}-CloudFrontDistributionId
    CloudFrontDomainName:
      Description: CloudFront Distribution Domain Name
      Value: !GetAtt FrontendCloudFrontDistribution.DomainName
      Export:
        Name: ${self:service}-${self:provider.stage}-CloudFrontDomainName
    CognitoUserPoolId:
      Description: Cognito User Pool ID
      Value: !Ref CognitoUserPool
      Export:
        Name: ${self:service}-${self:provider.stage}-CognitoUserPoolId
    CognitoUserPoolClientId:
      Description: Cognito User Pool Client ID
      Value: !Ref CognitoUserPoolClient
      Export:
        Name: ${self:service}-${self:provider.stage}-CognitoUserPoolClientId
