service: wwe-2k-league-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: ${env:SLS_RUNTIME, 'nodejs20.x'}
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    SERVICE_NAME: ${self:service}
    STAGE: ${self:provider.stage}
    PLAYERS_TABLE: ${self:service}-players-${self:provider.stage}
    MATCHES_TABLE: ${self:service}-matches-${self:provider.stage}
    CHAMPIONSHIPS_TABLE: ${self:service}-championships-${self:provider.stage}
    CHAMPIONSHIP_HISTORY_TABLE: ${self:service}-championship-history-${self:provider.stage}
    TOURNAMENTS_TABLE: ${self:service}-tournaments-${self:provider.stage}
    SEASONS_TABLE: ${self:service}-seasons-${self:provider.stage}
    SEASON_STANDINGS_TABLE: ${self:service}-season-standings-${self:provider.stage}
    DIVISIONS_TABLE: ${self:service}-divisions-${self:provider.stage}
    EVENTS_TABLE: ${self:service}-events-${self:provider.stage}
    CONTENDER_RANKINGS_TABLE: ${self:service}-contender-rankings-${self:provider.stage}
    RANKING_HISTORY_TABLE: ${self:service}-ranking-history-${self:provider.stage}
    IMAGES_BUCKET: ${self:service}-images-${self:provider.stage}
    FANTASY_CONFIG_TABLE: ${self:service}-fantasy-config-${self:provider.stage}
    WRESTLER_COSTS_TABLE: ${self:service}-wrestler-costs-${self:provider.stage}
    FANTASY_PICKS_TABLE: ${self:service}-fantasy-picks-${self:provider.stage}
    SITE_CONFIG_TABLE: ${self:service}-site-config-${self:provider.stage}
    CHALLENGES_TABLE: ${self:service}-challenges-${self:provider.stage}
    PROMOS_TABLE: ${self:service}-promos-${self:provider.stage}
    STIPULATIONS_TABLE: ${self:service}-stipulations-${self:provider.stage}
    MATCH_TYPES_TABLE: ${self:service}-match-types-${self:provider.stage}
    COGNITO_USER_POOL_ID: !Ref LeagueUserPool
    COGNITO_CLIENT_ID: !Ref LeagueUserPoolClient
    ADMIN_SETUP_KEY: ${env:ADMIN_SETUP_KEY, 'default-dev-key-change-in-production'}
    ALLOWED_ORIGIN: ${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PLAYERS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PLAYERS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCHES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCHES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHAMPIONSHIPS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHAMPIONSHIP_HISTORY_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TOURNAMENTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASON_STANDINGS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SEASON_STANDINGS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.DIVISIONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.EVENTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.EVENTS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CONTENDER_RANKINGS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CONTENDER_RANKINGS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.RANKING_HISTORY_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.RANKING_HISTORY_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.FANTASY_CONFIG_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.WRESTLER_COSTS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.FANTASY_PICKS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.FANTASY_PICKS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SITE_CONFIG_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHALLENGES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.CHALLENGES_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PROMOS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PROMOS_TABLE}/index/*
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.STIPULATIONS_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCH_TYPES_TABLE}
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::${self:provider.environment.IMAGES_BUCKET}/*
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminAddUserToGroup
            - cognito-idp:AdminRemoveUserFromGroup
            - cognito-idp:AdminListGroupsForUser
            - cognito-idp:AdminDisableUser
            - cognito-idp:AdminEnableUser
            - cognito-idp:ListUsers
            - cognito-idp:ListUsersInGroup
          Resource:
            - !GetAtt LeagueUserPool.Arn
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - arn:aws:lambda:${self:provider.region}:*:function:${self:service}-${self:provider.stage}-calculateRankings
            - arn:aws:lambda:${self:provider.region}:*:function:${self:service}-${self:provider.stage}-recalculateWrestlerCosts

plugins:
  - serverless-plugin-typescript
  - serverless-plugin-split-stacks
  - serverless-offline

custom:
  splitStacksEnabled:
    dev: true
    devtest: true
    offline: false
  splitStacks:
    perFunction: false
    perType: ${self:custom.splitStacksEnabled.${self:provider.stage}, true}
    perGroupFunction: false
  serverless-offline:
    httpPort: 3001
    environment:
      IS_OFFLINE: 'true'
  allowedOrigin:
    dev: https://leagueszn.jpdxsolo.com
    devtest: https://dev.leagueszn.jpdxsolo.com
    prod: https://leagueszn.jpdxsolo.com
    offline: '*'
  corsConfig: &corsConfig
    origin: ${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}
    headers:
      - Content-Type
      - X-Amz-Date
      - Authorization
      - X-Api-Key
      - X-Amz-Security-Token
      - X-Amz-User-Agent
    allowCredentials: true
  frontendBucket:
    dev: leagueszn.jpdxsolo.com
    devtest: dev.leagueszn.jpdxsolo.com
    prod: leagueszn.jpdxsolo.com
    offline: 'localhost'
  frontendDomain:
    dev: leagueszn.jpdxsolo.com
    devtest: dev.leagueszn.jpdxsolo.com
    prod: leagueszn.jpdxsolo.com
    offline: 'localhost'
  certificateArn:
    dev: ${env:PROD_ACM_CERTIFICATE_ARN, ''}
    devtest: ${env:DEV_ACM_CERTIFICATE_ARN, ''}
    prod: ${env:PROD_ACM_CERTIFICATE_ARN, ''}
    offline: ''

functions:
  # Auth
  adminAuthorizer:
    handler: functions/auth/authorizer.handler

  postConfirmation:
    handler: functions/auth/postConfirmation.handler

  createAdminUser:
    handler: functions/auth/createAdminUser.handler
    events:
      - http:
          path: auth/setup
          method: post
          cors: *corsConfig

  login:
    handler: functions/auth/login.handler
    events:
      - http:
          path: auth/login
          method: post
          cors: *corsConfig

  # User Management (Phase 3 consolidated: listUsers, updateUserRole, toggleUserEnabled)
  users:
    handler: functions/users/handler.handler
    events:
      - http:
          path: admin/users
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/users/role
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/users/toggle-enabled
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Site Configuration + Admin tools (Phase 3 consolidated: getSiteConfig, updateSiteConfig, clearAll, seedData)
  admin:
    handler: functions/admin/handler.handler
    timeout: 29
    events:
      - http:
          path: site-config
          method: get
          cors: *corsConfig
      - http:
          path: admin/site-config
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/clear-all
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/seed-data
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Player Profile (self-service for wrestlers)
  getMyProfile:
    handler: functions/players/getMyProfile.handler
    events:
      - http:
          path: players/me
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer

  updateMyProfile:
    handler: functions/players/updateMyProfile.handler
    events:
      - http:
          path: players/me
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Players
  getPlayers:
    handler: functions/players/getPlayers.handler
    events:
      - http:
          path: players
          method: get
          cors: *corsConfig

  createPlayer:
    handler: functions/players/createPlayer.handler
    events:
      - http:
          path: players
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  updatePlayer:
    handler: functions/players/updatePlayer.handler
    events:
      - http:
          path: players/{playerId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  deletePlayer:
    handler: functions/players/deletePlayer.handler
    events:
      - http:
          path: players/{playerId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Matches (Phase 3 consolidated: getMatches, scheduleMatch, recordResult)
  matches:
    handler: functions/matches/handler.handler
    events:
      - http:
          path: matches
          method: get
          cors: *corsConfig
      - http:
          path: matches
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: matches/{matchId}/result
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Championships
  getChampionships:
    handler: functions/championships/getChampionships.handler
    events:
      - http:
          path: championships
          method: get
          cors: *corsConfig

  createChampionship:
    handler: functions/championships/createChampionship.handler
    events:
      - http:
          path: championships
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  getChampionshipHistory:
    handler: functions/championships/getChampionshipHistory.handler
    events:
      - http:
          path: championships/{championshipId}/history
          method: get
          cors: *corsConfig

  updateChampionship:
    handler: functions/championships/updateChampionship.handler
    events:
      - http:
          path: championships/{championshipId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  deleteChampionship:
    handler: functions/championships/deleteChampionship.handler
    events:
      - http:
          path: championships/{championshipId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  vacateChampionship:
    handler: functions/championships/vacateChampionship.handler
    events:
      - http:
          path: championships/{championshipId}/vacate
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Tournaments (Phase 3 consolidated: getTournaments, createTournament, updateTournament)
  tournaments:
    handler: functions/tournaments/handler.handler
    events:
      - http:
          path: tournaments
          method: get
          cors: *corsConfig
      - http:
          path: tournaments
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: tournaments/{tournamentId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Standings
  getStandings:
    handler: functions/standings/getStandings.handler
    events:
      - http:
          path: standings
          method: get
          cors: *corsConfig

  # Seasons (Phase 1 consolidated: getSeasons, createSeason, updateSeason, deleteSeason)
  seasons:
    handler: functions/seasons/handler.handler
    events:
      - http:
          path: seasons
          method: get
          cors: *corsConfig
      - http:
          path: seasons
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: seasons/{seasonId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: seasons/{seasonId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Divisions (Phase 1 consolidated: getDivisions, createDivision, updateDivision, deleteDivision)
  divisions:
    handler: functions/divisions/handler.handler
    events:
      - http:
          path: divisions
          method: get
          cors: *corsConfig
      - http:
          path: divisions
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: divisions/{divisionId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: divisions/{divisionId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Stipulations (Phase 1 consolidated: getStipulations, createStipulation, updateStipulation, deleteStipulation)
  stipulations:
    handler: functions/stipulations/handler.handler
    events:
      - http:
          path: stipulations
          method: get
          cors: *corsConfig
      - http:
          path: stipulations
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: stipulations/{stipulationId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: stipulations/{stipulationId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Match Types (Phase 1 consolidated: getMatchTypes, createMatchType, updateMatchType, deleteMatchType)
  matchTypes:
    handler: functions/matchTypes/handler.handler
    events:
      - http:
          path: match-types
          method: get
          cors: *corsConfig
      - http:
          path: match-types
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: match-types/{matchTypeId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: match-types/{matchTypeId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Events
  getEvents:
    handler: functions/events/getEvents.handler
    events:
      - http:
          path: events
          method: get
          cors: *corsConfig

  getEvent:
    handler: functions/events/getEvent.handler
    events:
      - http:
          path: events/{eventId}
          method: get
          cors: *corsConfig

  createEvent:
    handler: functions/events/createEvent.handler
    events:
      - http:
          path: events
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  updateEvent:
    handler: functions/events/updateEvent.handler
    events:
      - http:
          path: events/{eventId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  deleteEvent:
    handler: functions/events/deleteEvent.handler
    events:
      - http:
          path: events/{eventId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Contenders (Phase 3 consolidated: getContenders, calculateRankings)
  contenders:
    handler: functions/contenders/handler.handler
    timeout: 29
    events:
      - http:
          path: championships/{championshipId}/contenders
          method: get
          cors: *corsConfig
      - http:
          path: admin/contenders/recalculate
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Images
  generateUploadUrl:
    handler: functions/images/generateUploadUrl.handler
    events:
      - http:
          path: images/upload-url
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # API Documentation (Swagger UI + OpenAPI spec)
  serveSwaggerUi:
    handler: functions/docs/serveDocs.handler
    events:
      - http:
          path: api-docs
          method: get
          cors: *corsConfig

  serveOpenApiSpec:
    handler: functions/docs/serveDocs.handler
    events:
      - http:
          path: api-docs/spec
          method: get
          cors: *corsConfig

  # Statistics
  getStatistics:
    handler: functions/statistics/getStatistics.handler
    timeout: 29
    events:
      - http:
          path: statistics
          method: get
          cors: *corsConfig

  # Fantasy (Phase 3 consolidated: all 12 fantasy handlers)
  fantasy:
    handler: functions/fantasy/handler.handler
    timeout: 29
    events:
      - http:
          path: fantasy/config
          method: get
          cors: *corsConfig
      - http:
          path: admin/fantasy/config
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: fantasy/wrestlers/costs
          method: get
          cors: *corsConfig
      - http:
          path: admin/fantasy/wrestlers/costs/initialize
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/fantasy/wrestlers/costs/recalculate
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: admin/fantasy/wrestlers/{playerId}/cost
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: fantasy/leaderboard
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: fantasy/score
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: fantasy/picks/{eventId}
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: fantasy/picks/{eventId}
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: fantasy/me/picks
          method: get
          cors: *corsConfig
          authorizer: adminAuthorizer
      - http:
          path: fantasy/picks/{eventId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Challenges
  getChallenges:
    handler: functions/challenges/getChallenges.handler
    events:
      - http:
          path: challenges
          method: get
          cors: *corsConfig

  getChallenge:
    handler: functions/challenges/getChallenge.handler
    events:
      - http:
          path: challenges/{challengeId}
          method: get
          cors: true

  createChallenge:
    handler: functions/challenges/createChallenge.handler
    events:
      - http:
          path: challenges
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  respondToChallenge:
    handler: functions/challenges/respondToChallenge.handler
    events:
      - http:
          path: challenges/{challengeId}/respond
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  cancelChallenge:
    handler: functions/challenges/cancelChallenge.handler
    events:
      - http:
          path: challenges/{challengeId}/cancel
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  deleteChallenge:
    handler: functions/challenges/deleteChallenge.handler
    events:
      - http:
          path: challenges/{challengeId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  bulkDeleteChallenges:
    handler: functions/challenges/bulkDeleteChallenges.handler
    events:
      - http:
          path: challenges/bulk-delete
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  # Promos
  getPromos:
    handler: functions/promos/getPromos.handler
    events:
      - http:
          path: promos
          method: get
          cors: *corsConfig

  getPromo:
    handler: functions/promos/getPromo.handler
    events:
      - http:
          path: promos/{promoId}
          method: get
          cors: *corsConfig

  createPromo:
    handler: functions/promos/createPromo.handler
    events:
      - http:
          path: promos
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  reactToPromo:
    handler: functions/promos/reactToPromo.handler
    events:
      - http:
          path: promos/{promoId}/react
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

  adminUpdatePromo:
    handler: functions/promos/adminUpdatePromo.handler
    events:
      - http:
          path: admin/promos/{promoId}
          method: put
          cors: *corsConfig
          authorizer: adminAuthorizer

  deletePromo:
    handler: functions/promos/deletePromo.handler
    events:
      - http:
          path: admin/promos/{promoId}
          method: delete
          cors: *corsConfig
          authorizer: adminAuthorizer

  bulkDeletePromos:
    handler: functions/promos/bulkDeletePromos.handler
    events:
      - http:
          path: admin/promos/bulk-delete
          method: post
          cors: *corsConfig
          authorizer: adminAuthorizer

resources:
  Resources:
    # API Gateway Response for CORS with Authorizer
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: DEFAULT_4XX
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseDefault5XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: DEFAULT_5XX
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseUnauthorized:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: UNAUTHORIZED
        RestApiId:
          Ref: ApiGatewayRestApi

    GatewayResponseAccessDenied:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.allowedOrigin.${self:provider.stage}, 'https://leagueszn.jpdxsolo.com'}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: ACCESS_DENIED
        RestApiId:
          Ref: ApiGatewayRestApi

    # New Cognito User Pool (v3) with email login and roles
    # PostConfirmation trigger is attached via setup-cognito.sh after deploy
    # (can't be in CloudFormation due to circular dep with shared IAM role)
    LeagueUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-pool-v3-${self:provider.stage}
        AdminCreateUserConfig:
          AllowAdminCreateUserOnly: false
        AutoVerifiedAttributes:
          - email
        UsernameAttributes:
          - email
        Schema:
          - Name: email
            Required: true
            Mutable: true
          - Name: wrestler_name
            AttributeDataType: String
            Mutable: true
            StringAttributeConstraints:
              MinLength: '0'
              MaxLength: '100'
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
            RequireUppercase: true

    # Cognito Groups for role-based access
    AdminGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Admin
        UserPoolId: !Ref LeagueUserPool
        Description: Full access to all features including user management
        Precedence: 0

    ModeratorGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Moderator
        UserPoolId: !Ref LeagueUserPool
        Description: Admin-level access except cannot manage Admin/Moderator roles or delete all data
        Precedence: 1

    WrestlerGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Wrestler
        UserPoolId: !Ref LeagueUserPool
        Description: Access to wrestler features (challenges, promos) plus fantasy
        Precedence: 2

    FantasyGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Fantasy
        UserPoolId: !Ref LeagueUserPool
        Description: Access to fantasy features and public data
        Precedence: 3

    LeagueUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-client-v3-${self:provider.stage}
        UserPoolId: !Ref LeagueUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        PreventUserExistenceErrors: ENABLED
        AccessTokenValidity: 24
        IdTokenValidity: 24
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days

    PlayersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PLAYERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: playerId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: playerId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: UserIdIndex
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    MatchesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MATCHES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: matchId
            AttributeType: S
          - AttributeName: date
            AttributeType: S
          - AttributeName: tournamentId
            AttributeType: S
        KeySchema:
          - AttributeName: matchId
            KeyType: HASH
          - AttributeName: date
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: TournamentIndex
            KeySchema:
              - AttributeName: tournamentId
                KeyType: HASH
              - AttributeName: matchId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    ChampionshipsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CHAMPIONSHIPS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: championshipId
            AttributeType: S
        KeySchema:
          - AttributeName: championshipId
            KeyType: HASH

    ChampionshipHistoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CHAMPIONSHIP_HISTORY_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: championshipId
            AttributeType: S
          - AttributeName: wonDate
            AttributeType: S
        KeySchema:
          - AttributeName: championshipId
            KeyType: HASH
          - AttributeName: wonDate
            KeyType: RANGE

    TournamentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TOURNAMENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tournamentId
            AttributeType: S
        KeySchema:
          - AttributeName: tournamentId
            KeyType: HASH

    SeasonsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SEASONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: seasonId
            AttributeType: S
        KeySchema:
          - AttributeName: seasonId
            KeyType: HASH

    SeasonStandingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SEASON_STANDINGS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: seasonId
            AttributeType: S
          - AttributeName: playerId
            AttributeType: S
        KeySchema:
          - AttributeName: seasonId
            KeyType: HASH
          - AttributeName: playerId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: PlayerIndex
            KeySchema:
              - AttributeName: playerId
                KeyType: HASH
              - AttributeName: seasonId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    DivisionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DIVISIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: divisionId
            AttributeType: S
        KeySchema:
          - AttributeName: divisionId
            KeyType: HASH

    EventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.EVENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: eventId
            AttributeType: S
          - AttributeName: eventType
            AttributeType: S
          - AttributeName: date
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: seasonId
            AttributeType: S
        KeySchema:
          - AttributeName: eventId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: DateIndex
            KeySchema:
              - AttributeName: eventType
                KeyType: HASH
              - AttributeName: date
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: StatusIndex
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: date
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: SeasonIndex
            KeySchema:
              - AttributeName: seasonId
                KeyType: HASH
              - AttributeName: date
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    ContenderRankingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CONTENDER_RANKINGS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: championshipId
            AttributeType: S
          - AttributeName: playerId
            AttributeType: S
          - AttributeName: rank
            AttributeType: N
        KeySchema:
          - AttributeName: championshipId
            KeyType: HASH
          - AttributeName: playerId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: RankIndex
            KeySchema:
              - AttributeName: championshipId
                KeyType: HASH
              - AttributeName: rank
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    RankingHistoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.RANKING_HISTORY_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: playerId
            AttributeType: S
          - AttributeName: weekKey
            AttributeType: S
          - AttributeName: championshipId
            AttributeType: S
        KeySchema:
          - AttributeName: playerId
            KeyType: HASH
          - AttributeName: weekKey
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: ChampionshipWeekIndex
            KeySchema:
              - AttributeName: championshipId
                KeyType: HASH
              - AttributeName: weekKey
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    FantasyConfigTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.FANTASY_CONFIG_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: configKey
            AttributeType: S
        KeySchema:
          - AttributeName: configKey
            KeyType: HASH

    WrestlerCostsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.WRESTLER_COSTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: playerId
            AttributeType: S
        KeySchema:
          - AttributeName: playerId
            KeyType: HASH

    FantasyPicksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.FANTASY_PICKS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: eventId
            AttributeType: S
          - AttributeName: fantasyUserId
            AttributeType: S
        KeySchema:
          - AttributeName: eventId
            KeyType: HASH
          - AttributeName: fantasyUserId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: UserPicksIndex
            KeySchema:
              - AttributeName: fantasyUserId
                KeyType: HASH
              - AttributeName: eventId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    SiteConfigTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SITE_CONFIG_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: configKey
            AttributeType: S
        KeySchema:
          - AttributeName: configKey
            KeyType: HASH

    ChallengesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CHALLENGES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: challengeId
            AttributeType: S
          - AttributeName: challengerId
            AttributeType: S
          - AttributeName: challengedId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: challengeId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: ChallengerIndex
            KeySchema:
              - AttributeName: challengerId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: ChallengedIndex
            KeySchema:
              - AttributeName: challengedId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: StatusIndex
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    PromosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PROMOS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: promoId
            AttributeType: S
          - AttributeName: playerId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
          - AttributeName: promoType
            AttributeType: S
        KeySchema:
          - AttributeName: promoId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: PlayerIndex
            KeySchema:
              - AttributeName: playerId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: TypeIndex
            KeySchema:
              - AttributeName: promoType
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    StipulationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.STIPULATIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: stipulationId
            AttributeType: S
        KeySchema:
          - AttributeName: stipulationId
            KeyType: HASH

    MatchTypesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MATCH_TYPES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: matchTypeId
            AttributeType: S
        KeySchema:
          - AttributeName: matchTypeId
            KeyType: HASH

    ImagesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.IMAGES_BUCKET}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - PUT
                - POST
              AllowedOrigins:
                - '*'
              MaxAge: 3000

    ImagesBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref ImagesBucket
        PolicyDocument:
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action:
                - s3:GetObject
              Resource:
                - !Sub '${ImagesBucket.Arn}/*'

    # CloudFront Distribution for HTTPS frontend
    # Uses S3 website endpoint (existing public bucket) instead of OAI
    FrontendCloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          Comment: CloudFront distribution for ${self:custom.frontendDomain.${self:provider.stage}, 'leagueszn.jpdxsolo.com'}
          DefaultRootObject: index.html
          Aliases:
            - ${self:custom.frontendDomain.${self:provider.stage}, 'leagueszn.jpdxsolo.com'}
          Origins:
            - Id: S3WebsiteOrigin
              DomainName: ${self:custom.frontendBucket.${self:provider.stage}, 'leagueszn.jpdxsolo.com'}.s3-website-us-east-1.amazonaws.com
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: http-only
          DefaultCacheBehavior:
            TargetOriginId: S3WebsiteOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            DefaultTTL: 86400
            MaxTTL: 31536000
            MinTTL: 0
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 0
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 0
          ViewerCertificate:
            AcmCertificateArn: ${self:custom.certificateArn.${self:provider.stage}}
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          HttpVersion: http2
          PriceClass: PriceClass_100

  Outputs:
    CloudFrontDistributionId:
      Description: CloudFront Distribution ID for cache invalidation
      Value: !Ref FrontendCloudFrontDistribution
      Export:
        Name: ${self:service}-${self:provider.stage}-CloudFrontDistributionId
    CloudFrontDomainName:
      Description: CloudFront Distribution Domain Name
      Value: !GetAtt FrontendCloudFrontDistribution.DomainName
      Export:
        Name: ${self:service}-${self:provider.stage}-CloudFrontDomainName
    CognitoUserPoolId:
      Description: Cognito User Pool ID
      Value: !Ref LeagueUserPool
      Export:
        Name: ${self:service}-${self:provider.stage}-CognitoUserPoolId
    CognitoUserPoolClientId:
      Description: Cognito User Pool Client ID
      Value: !Ref LeagueUserPoolClient
      Export:
        Name: ${self:service}-${self:provider.stage}-CognitoUserPoolClientId
