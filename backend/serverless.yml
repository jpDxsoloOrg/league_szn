    # Faction-channel messages: one item per post in a faction's shared channel.
    # PK=factionId, SK=createdAt#messageId — composite SK keeps sort stable when
    # two posts land at the same millisecond. Audience-only (active members)
    # is enforced in the handler, not the table.
    FactionMessagesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.FACTION_MESSAGES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: factionId
            AttributeType: S
          - AttributeName: createdAtMessageId
            AttributeType: S
        KeySchema:
          - AttributeName: factionId
            KeyType: HASH
          - AttributeName: createdAtMessageId
            KeyType: RANGE

    # 1:1 direct messages between two members of the same faction.
    # PK=factionId#threadKey, SK=createdAt#messageId. threadKey is the
    # deterministic sort of [a, b] joined by `#` so both sides see the same
    # thread. No GSI needed — the PK already scopes by thread.
    FactionDirectMessagesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.FACTION_DIRECT_MESSAGES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: factionThreadKey
            AttributeType: S
          - AttributeName: createdAtMessageId
            AttributeType: S
          - AttributeName: factionId
            AttributeType: S
          - AttributeName: senderPlayerId
            AttributeType: S
          - AttributeName: recipientPlayerId
            AttributeType: S
        KeySchema:
          - AttributeName: factionThreadKey
            KeyType: HASH
          - AttributeName: createdAtMessageId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          # Enables listThreadsForPlayer: enumerate every thread a player is
          # part of inside a given faction (as sender).
          - IndexName: FactionSenderIndex
            KeySchema:
              - AttributeName: factionId
                KeyType: HASH
              - AttributeName: senderPlayerId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          # …and as recipient.
          - IndexName: FactionRecipientIndex
            KeySchema:
              - AttributeName: factionId
                KeyType: HASH
              - AttributeName: recipientPlayerId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # Rivalries (RIV-01): one base row per rivalry (recordType="META") plus
    # one row per participant (recordType="PARTICIPANT#<playerId>"). The
    # participant rows duplicate `participantId` so the ParticipantIndex GSI
    # can answer "all rivalries player X is in" cheaply. The META rows expose
    # `status` so the StatusIndex GSI can power admin moderation queues.
    # Both GSIs are sparse — items lacking the index attributes are skipped.
    RivalriesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.RIVALRIES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: rivalryId
            AttributeType: S
          - AttributeName: recordType
            AttributeType: S
          - AttributeName: participantId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: rivalryId
            KeyType: HASH
          - AttributeName: recordType
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: ParticipantIndex
            KeySchema:
              - AttributeName: participantId
                KeyType: HASH
              - AttributeName: rivalryId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: StatusIndex
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # Rivalry messages (RIV-01): every post on a rivalry thread. PK=rivalryId,
    # SK=createdAt#messageId so a single Query returns the whole thread in
    # time order with no GSI. Audience filtering (`all` vs `participants` vs
    # `admins`) lives on each row and is enforced by handlers.
    RivalryMessagesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.RIVALRY_MESSAGES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: rivalryId
            AttributeType: S
          - AttributeName: createdAtMessageId
            AttributeType: S
        KeySchema:
          - AttributeName: rivalryId
            KeyType: HASH
          - AttributeName: createdAtMessageId
            KeyType: RANGE

