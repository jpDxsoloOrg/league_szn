openapi: 3.0.3
info:
  title: WWE 2K League API
  version: 1.0.0
  description: Serverless API for managing a WWE 2K league (standings, championships, matches, tournaments, events, challenges, promos, statistics). Authenticated endpoints require a JWT Bearer token (AWS Cognito).
  license:
    name: Unlicense
    url: https://unlicense.org

# Default: no auth required. Override with security: [{ BearerAuth: [] }] on protected operations.
security: []

servers:
  - url: http://localhost:3001/dev
    description: Local (serverless-offline)
  - url: https://dgsmskbzb2.execute-api.us-east-1.amazonaws.com/devtest
    description: Devtest
  - url: https://9pcccl0caj.execute-api.us-east-1.amazonaws.com/dev
    description: Dev/Prod

tags:
  - name: Auth
  - name: Users
  - name: Site Config
  - name: Profile
  - name: Players
  - name: Matches
  - name: Championships
  - name: Tournaments
  - name: Standings
  - name: Seasons
  - name: Divisions
  - name: Stipulations
  - name: Match Types
  - name: Events
  - name: Contenders
  - name: Images
  - name: Admin
  - name: Challenges
  - name: Promos
  - name: Statistics
  - name: Dashboard
  - name: Activity
  - name: Rivalries
  - name: Season Awards
  - name: Companies
  - name: Shows
  - name: Locations
  - name: Wrestlers
  - name: Matchmaking
  - name: Stables
  - name: Tag Teams
  - name: Videos
  - name: Announcements
  - name: Notifications
  - name: Transfers
  - name: Storyline Requests
  - name: Overalls

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from AWS Cognito (login or admin).

  schemas:
    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }

    Player:
      type: object
      properties:
        playerId: { type: string }
        userId: { type: string }
        name: { type: string }
        currentWrestler: { type: string }
        wins: { type: integer }
        losses: { type: integer }
        draws: { type: integer }
        imageUrl: { type: string }
        divisionId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Match:
      type: object
      properties:
        matchId: { type: string }
        date: { type: string }
        matchFormat: { type: string }
        stipulationId: { type: string }
        participants: { type: array, items: { type: string } }
        teams: { type: array, items: { type: array, items: { type: string } } }
        winners: { type: array, items: { type: string } }
        losers: { type: array, items: { type: string } }
        winningTeam: { type: integer }
        isChampionship: { type: boolean }
        isTitleDefense: { type: boolean }
        championshipId: { type: string }
        tournamentId: { type: string }
        seasonId: { type: string }
        status: { type: string, enum: [scheduled, completed] }
        createdAt: { type: string }
        challengeId: { type: string }
        promoId: { type: string }

    ScheduleMatchInput:
      type: object
      required: [matchFormat, participants, isChampionship, status]
      properties:
        date: { type: string }
        matchFormat: { type: string }
        stipulationId: { type: string }
        participants: { type: array, items: { type: string } }
        teams: { type: array, items: { type: array, items: { type: string } } }
        isChampionship: { type: boolean }
        championshipId: { type: string }
        tournamentId: { type: string }
        seasonId: { type: string }
        eventId: { type: string }
        designation: { type: string }
        status: { type: string, enum: [scheduled] }
        challengeId: { type: string }
        promoId: { type: string }

    RecordResultInput:
      type: object
      properties:
        winners: { type: array, items: { type: string } }
        losers: { type: array, items: { type: string } }
        winningTeam: { type: integer }

    Championship:
      type: object
      properties:
        championshipId: { type: string }
        name: { type: string }
        type: { type: string, enum: [singles, tag] }
        currentChampion: { oneOf: [{ type: string }, { type: array, items: { type: string } }] }
        divisionId: { type: string }
        imageUrl: { type: string }
        createdAt: { type: string }
        isActive: { type: boolean }

    ChampionshipReign:
      type: object
      properties:
        championshipId: { type: string }
        champion: { oneOf: [{ type: string }, { type: array, items: { type: string } }] }
        wonDate: { type: string }
        lostDate: { type: string }
        matchId: { type: string }
        daysHeld: { type: integer }
        defenses: { type: integer }

    Tournament:
      type: object
      properties:
        tournamentId: { type: string }
        name: { type: string }
        type: { type: string, enum: [single-elimination, round-robin] }
        status: { type: string, enum: [upcoming, in-progress, completed] }
        participants: { type: array, items: { type: string } }
        brackets: { $ref: '#/components/schemas/TournamentBracket' }
        standings: { type: object }
        winner: { type: string }
        createdAt: { type: string }

    TournamentBracket:
      type: object
      properties:
        rounds: { type: array, items: { $ref: '#/components/schemas/BracketRound' } }

    BracketRound:
      type: object
      properties:
        roundNumber: { type: integer }
        matches: { type: array, items: { $ref: '#/components/schemas/BracketMatch' } }

    BracketMatch:
      type: object
      properties:
        matchId: { type: string }
        participant1: { type: string }
        participant2: { type: string }
        winner: { type: string }

    RoundRobinStanding:
      type: object
      properties:
        playerId: { type: string }
        wins: { type: integer }
        losses: { type: integer }
        draws: { type: integer }
        points: { type: integer }

    Standings:
      type: object
      properties:
        players: { type: array, items: { $ref: '#/components/schemas/Player' } }
        seasonId: { type: string }
        sortedByWins: { type: boolean }

    Season:
      type: object
      properties:
        seasonId: { type: string }
        name: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        status: { type: string, enum: [active, completed] }
        createdAt: { type: string }
        updatedAt: { type: string }

    Division:
      type: object
      properties:
        divisionId: { type: string }
        name: { type: string }
        description: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    Stipulation:
      type: object
      properties:
        stipulationId: { type: string }
        name: { type: string }
        description: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    MatchType:
      type: object
      properties:
        matchTypeId: { type: string }
        name: { type: string }
        description: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    LeagueEvent:
      type: object
      properties:
        eventId: { type: string }
        name: { type: string }
        eventType: { type: string, enum: [ppv, weekly, special, house] }
        date: { type: string }
        venue: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        themeColor: { type: string }
        status: { type: string, enum: [upcoming, in-progress, completed, cancelled] }
        seasonId: { type: string }
        matchCards: { type: array, items: { $ref: '#/components/schemas/MatchCardEntry' } }
        attendance: { type: integer }
        rating: { type: number }
        createdAt: { type: string }
        updatedAt: { type: string }

    MatchCardEntry:
      type: object
      properties:
        position: { type: integer }
        matchId: { type: string }
        designation: { type: string, enum: [pre-show, opener, midcard, co-main, main-event] }
        notes: { type: string }

    EventWithMatches:
      allOf:
        - { $ref: '#/components/schemas/LeagueEvent' }
        - type: object
          properties:
            enrichedMatches: { type: array }

    CreateEventInput:
      type: object
      required: [name, eventType, date]
      properties:
        name: { type: string }
        eventType: { type: string, enum: [ppv, weekly, special, house] }
        date: { type: string }
        venue: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        themeColor: { type: string }
        seasonId: { type: string }
    UpdateEventInput:
      type: object
      properties:
        eventId: { type: string }
        name: { type: string }
        eventType: { type: string }
        date: { type: string }
        status: { type: string }
        matchCards: { type: array, items: { $ref: '#/components/schemas/MatchCardEntry' } }
        attendance: { type: integer }
        rating: { type: number }
    Challenge:
      type: object
      properties:
        challengeId: { type: string }
        challengerId: { type: string }
        challengedId: { type: string }
        matchType: { type: string }
        stipulation: { type: string }
        championshipId: { type: string }
        message: { type: string }
        status: { type: string, enum: [pending, accepted, declined, countered, scheduled, expired, cancelled] }
        responseMessage: { type: string }
        counteredChallengeId: { type: string }
        matchId: { type: string }
        expiresAt: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    ChallengeWithPlayers:
      allOf:
        - { $ref: '#/components/schemas/Challenge' }
        - type: object
          properties:
            challenger: { $ref: '#/components/schemas/ChallengePlayerInfo' }
            challenged: { $ref: '#/components/schemas/ChallengePlayerInfo' }

    ChallengePlayerInfo:
      type: object
      properties:
        playerName: { type: string }
        wrestlerName: { type: string }
        imageUrl: { type: string }

    CreateChallengeInput:
      type: object
      required: [challengedId, matchType]
      properties:
        challengedId: { type: string }
        matchType: { type: string }
        stipulation: { type: string }
        championshipId: { type: string }
        message: { type: string }

    RespondChallengeInput:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [accept, decline, counter] }
        message: { type: string }
        matchType: { type: string }
        stipulation: { type: string }

    Promo:
      type: object
      properties:
        promoId: { type: string }
        playerId: { type: string }
        promoType: { type: string }
        title: { type: string }
        content: { type: string }
        targetPlayerId: { type: string }
        targetPromoId: { type: string }
        matchId: { type: string }
        championshipId: { type: string }
        imageUrl: { type: string }
        reactions: { type: object }
        reactionCounts: { type: object }
        isPinned: { type: boolean }
        isHidden: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }

    PromoWithContext:
      allOf:
        - { $ref: '#/components/schemas/Promo' }
        - type: object
          properties:
            playerName: { type: string }
            wrestlerName: { type: string }
            responseCount: { type: integer }

    CreatePromoInput:
      type: object
      required: [promoType, content]
      properties:
        promoType: { type: string }
        title: { type: string }
        content: { type: string }
        targetPlayerId: { type: string }
        targetPromoId: { type: string }
        matchId: { type: string }
        championshipId: { type: string }

    ReactToPromoInput:
      type: object
      required: [reactionType]
      properties:
        reactionType: { type: string, enum: [fire, mic, trash, mind-blown, clap] }

    ChampionshipContenders:
      type: object
      properties:
        championshipId: { type: string }
        championshipName: { type: string }
        currentChampion: { type: object }
        contenders: { type: array }
        calculatedAt: { type: string }

    SiteFeatures:
      type: object
      properties:
        challenges: { type: boolean }
        promos: { type: boolean }
        contenders: { type: boolean }
        statistics: { type: boolean }

    SiteConfigResponse:
      type: object
      properties:
        features: { $ref: '#/components/schemas/SiteFeatures' }

    UserListItem:
      type: object
      properties:
        userId: { type: string }
        email: { type: string }
        username: { type: string }
        roles: { type: array, items: { type: string } }
        enabled: { type: boolean }

    UpdateRoleInput:
      type: object
      required: [userId, role]
      properties:
        userId: { type: string }
        role: { type: string }

    ToggleEnabledInput:
      type: object
      required: [userId]
      properties:
        userId: { type: string }

    AuthSetupInput:
      type: object
      properties:
        adminSetupKey: { type: string }
        email: { type: string }
        password: { type: string }
        username: { type: string }

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        accessToken: { type: string, description: 'JWT access token for API authorization' }
        idToken: { type: string, description: 'JWT ID token with user claims' }
        refreshToken: { type: string, description: 'Token to refresh the session' }
        expiresIn: { type: integer, description: 'Token lifetime in seconds' }
        tokenType: { type: string, example: 'Bearer' }

    GenerateUploadUrlResponse:
      type: object
      properties:
        uploadUrl: { type: string }
        imageUrl: { type: string }

    BulkDeleteChallengesInput:
      type: object
      properties:
        challengeIds: { type: array, items: { type: string } }

    BulkDeletePromosInput:
      type: object
      properties:
        promoIds: { type: array, items: { type: string } }

    PlayerStatistics:
      type: object
      properties:
        playerId: { type: string }
        statType: { type: string }
        wins: { type: integer }
        losses: { type: integer }
        draws: { type: integer }
        matchesPlayed: { type: integer }
        winPercentage: { type: number }
        currentWinStreak: { type: integer }
        longestWinStreak: { type: integer }
        championshipWins: { type: integer }
        championshipLosses: { type: integer }
        updatedAt: { type: string }

    HeadToHead:
      type: object
      properties:
        matchupKey: { type: string }
        player1Id: { type: string }
        player2Id: { type: string }
        player1Wins: { type: integer }
        player2Wins: { type: integer }
        draws: { type: integer }
        totalMatches: { type: integer }
        recentResults: { type: array }
        updatedAt: { type: string }

    LeaderboardEntry:
      type: object
      properties:
        playerId: { type: string }
        playerName: { type: string }
        wrestlerName: { type: string }
        value: { type: number }
        rank: { type: integer }

    RecordEntry:
      type: object
      properties:
        recordName: { type: string }
        holderName: { type: string }
        wrestlerName: { type: string }
        value: { oneOf: [{ type: number }, { type: string }] }
        date: { type: string }
        description: { type: string }

    Achievement:
      type: object
      properties:
        playerId: { type: string }
        achievementId: { type: string }
        achievementName: { type: string }
        achievementType: { type: string }
        description: { type: string }
        earnedAt: { type: string }
        icon: { type: string }

    StatisticsResponse:
      type: object
      description: Response shape varies by query param section (overall, headToHead, leaderboards, records, achievements, etc.)
      additionalProperties: true

    Company:
      type: object
      properties:
        companyId: { type: string }
        name: { type: string }
        abbreviation: { type: string }
        imageUrl: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Show:
      type: object
      properties:
        showId: { type: string }
        name: { type: string }
        companyId: { type: string }
        description: { type: string }
        schedule: { type: string }
        dayOfWeek: { type: string }
        ppvDate: { type: string }
        imageUrl: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Location:
      type: object
      properties:
        locationId: { type: string }
        name: { type: string }
        city: { type: string }
        state: { type: string }
        country: { type: string }
        capacity: { type: integer }
        latitude: { type: number }
        longitude: { type: number }
        imageUrl: { type: string }
        notes: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Wrestler:
      type: object
      properties:
        wrestlerId: { type: string }
        promotion: { type: string, enum: [AAA, AEW, NJPW, ROH, TNA, WCW, WWE, OTHER] }
        name: { type: string }
        overallCap: { type: integer, minimum: 70, maximum: 93 }
        isInUse: { type: boolean }
        assignedPlayerId: { type: string }
        assignedSlot: { type: string, enum: [primary, alternate] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Stable:
      type: object
      properties:
        stableId: { type: string }
        name: { type: string }
        leaderId: { type: string }
        memberIds: { type: array, items: { type: string } }
        imageUrl: { type: string }
        status: { type: string, enum: [pending, approved, active, disbanded] }
        wins: { type: integer }
        losses: { type: integer }
        draws: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        disbandedAt: { type: string, format: date-time }

    StableInvitation:
      type: object
      properties:
        invitationId: { type: string }
        stableId: { type: string }
        invitedPlayerId: { type: string }
        invitedByPlayerId: { type: string }
        status: { type: string, enum: [pending, accepted, declined, expired] }
        message: { type: string }
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TagTeam:
      type: object
      properties:
        tagTeamId: { type: string }
        name: { type: string }
        player1Id: { type: string }
        player2Id: { type: string }
        imageUrl: { type: string }
        status: { type: string, enum: [pending_partner, pending_admin, active, dissolved] }
        wins: { type: integer }
        losses: { type: integer }
        draws: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        dissolvedAt: { type: string, format: date-time }

    Video:
      type: object
      properties:
        videoId: { type: string }
        title: { type: string }
        description: { type: string }
        videoUrl: { type: string }
        thumbnailUrl: { type: string }
        category: { type: string, enum: [match, highlight, promo, other] }
        tags: { type: array, items: { type: string } }
        isPublished: { type: boolean }
        uploadedBy: { type: string }
        createdAt: { type: string, format: date-time }

    Announcement:
      type: object
      properties:
        announcementId: { type: string }
        title: { type: string }
        body: { type: string }
        priority: { type: integer }
        isActive: { type: boolean }
        expiresAt: { type: string, format: date-time }
        videoUrl: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        notificationId: { type: string }
        userId: { type: string }
        type: { type: string }
        message: { type: string }
        sourceId: { type: string }
        sourceType: { type: string }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }

    TransferRequest:
      type: object
      properties:
        requestId: { type: string }
        playerId: { type: string }
        fromDivisionId: { type: string }
        toDivisionId: { type: string }
        reason: { type: string }
        status: { type: string, enum: [pending, approved, rejected] }
        reviewNote: { type: string }
        reviewedBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    StorylineRequest:
      type: object
      properties:
        requestId: { type: string }
        requesterId: { type: string }
        targetPlayerIds: { type: array, items: { type: string } }
        requestType: { type: string, enum: [storyline, backstage_attack, rivalry] }
        description: { type: string }
        status: { type: string, enum: [pending, acknowledged, declined] }
        gmNote: { type: string }
        reviewedBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    OverallSubmission:
      type: object
      properties:
        playerId: { type: string }
        mainOverall: { type: integer, minimum: 60, maximum: 99 }
        alternateOverall: { type: integer, minimum: 60, maximum: 99 }
        submittedAt: { type: string, format: date-time }

    SeasonAward:
      type: object
      properties:
        awardId: { type: string }
        seasonId: { type: string }
        name: { type: string }
        awardType: { type: string }
        playerId: { type: string }
        playerName: { type: string }
        description: { type: string }
        value: { type: string }
        autoGenerated: { type: boolean }
        createdAt: { type: string, format: date-time }

    ContenderOverride:
      type: object
      properties:
        championshipId: { type: string }
        playerId: { type: string }
        overrideType: { type: string, enum: [bump_to_top, send_to_bottom] }
        reason: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        active: { type: boolean }
        playerName: { type: string }
        wrestlerName: { type: string }
        playerImageUrl: { type: string }

    MatchmakingInvitation:
      type: object
      properties:
        invitationId: { type: string }
        fromPlayerId: { type: string }
        toPlayerId: { type: string }
        matchFormat: { type: string }
        stipulationId: { type: string }
        status: { type: string, enum: [pending, accepted, declined] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    DeleteUserInput:
      type: object
      required: [userId]
      properties:
        userId: { type: string }

paths:
  /auth/setup:
    post:
      tags: [Auth]
      summary: Create initial admin user
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthSetupInput' }
      responses:
        '201': { description: Admin created }
        '400': { description: 'Bad request', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: Conflict, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with username and password
      description: Authenticates against AWS Cognito and returns JWT tokens. Use the accessToken in the Authorization header as "Bearer {accessToken}" to call protected endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginInput' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '400': { description: 'Bad request', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: 'Invalid credentials', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /admin/users:
    get:
      tags: [Users]
      summary: List users (admin)
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: List of users }
        '401': { description: 'Unauthorized', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
