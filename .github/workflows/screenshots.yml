name: Capture Screenshots

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  screenshots:
    name: Capture Page Screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Capture screenshots
        working-directory: e2e
        run: npm run screenshots

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: page-screenshots
          path: screenshots/
          retention-days: 30

      - name: Screenshot summary
        if: always()
        run: |
          echo "## Page Screenshots Captured" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(find screenshots -name "*.png" 2>/dev/null | wc -l)
          echo "**Total screenshots:** ${TOTAL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for dir in screenshots/*/; do
            if [ -d "$dir" ]; then
              group=$(basename "$dir")
              count=$(find "$dir" -name "*.png" | wc -l)
              echo "- **${group}**: ${count} screenshots" >> $GITHUB_STEP_SUMMARY
            fi
          done
