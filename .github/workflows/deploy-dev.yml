name: Deploy to Dev

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '24'

jobs:
  deploy-dev:
    name: Deploy to Dev Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build -- --mode devtest
        env:
          VITE_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: us-east-1_o0xMTyzI5
          VITE_COGNITO_CLIENT_ID: 5loqna6cm7ip5cka75koovla07
          VITE_AWS_REGION: us-east-1

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Deploy backend to dev
        working-directory: backend
        run: npx serverless deploy --stage devtest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DEV_ACM_CERTIFICATE_ARN: ${{ secrets.DEV_ACM_CERTIFICATE_ARN }}

      - name: Deploy frontend to S3
        working-directory: frontend
        run: aws s3 sync dist s3://dev.leagueszn.jpdxsolo.com --delete

      - name: Get CloudFront Distribution ID
        id: cloudfront
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name wwe-2k-league-api-devtest \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cloudfront.outputs.distribution_id }} \
            --paths "/*"

      - name: Wait for CloudFront invalidation
        run: |
          echo "Waiting for CloudFront cache to propagate..."
          sleep 30

