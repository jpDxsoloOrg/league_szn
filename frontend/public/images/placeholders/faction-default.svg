<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
  <title id="title">Default faction image</title>
  <desc id="desc">A dark gold-trimmed placeholder used when a faction has no hero image.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0f0f0f" />
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" />
  <rect x="0" y="118" width="320" height="2" fill="url(#rule)" />
  <text x="160" y="100" fill="#d4af37" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="6" text-anchor="middle">FACTION</text>
</svg>
